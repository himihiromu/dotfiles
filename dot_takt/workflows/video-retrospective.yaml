name: video-retrospective
description: 制作プロセスを振り返り、知識抽出とテンプレート改善を行う
initial_step: summarize_production
max_steps: 10

steps:
  - name: summarize_production
    persona: production-summarizer
    policy:
      - video-retrospective-common
    instruction: summarize-production
    edit: true
    required_permission_mode: edit
    output_contracts:
      report:
        - name: production-summary.md
          format: video-artifact-report
    rules:
      - condition: STEP_COMPLETE
        next: analyze_process
      - condition: STEP_BLOCKED
        next: ABORT

  - name: analyze_process
    persona: process-analyzer
    policy:
      - video-retrospective-common
    instruction: analyze-process
    edit: true
    required_permission_mode: edit
    output_contracts:
      report:
        - name: process-analysis.md
          format: video-artifact-report
    rules:
      - condition: STEP_COMPLETE
        next: extract_knowledge
      - condition: STEP_BLOCKED
        next: ABORT

  - name: extract_knowledge
    persona: knowledge-extractor
    policy:
      - video-retrospective-common
    instruction: extract-knowledge
    edit: true
    required_permission_mode: edit
    output_contracts:
      report:
        - name: knowledge-candidates.md
          format: video-artifact-report
    rules:
      - condition: STEP_COMPLETE
        next: update_templates
      - condition: STEP_BLOCKED
        next: ABORT

  - name: update_templates
    persona: template-updater
    policy:
      - video-retrospective-common
    instruction: update-templates
    edit: true
    required_permission_mode: edit
    output_contracts:
      report:
        - name: template-update-plan.md
          format: video-artifact-report
    rules:
      - condition: STEP_COMPLETE
        next: review_retrospective
      - condition: STEP_BLOCKED
        next: ABORT

  - name: review_retrospective
    persona: retrospective-reviewer
    policy:
      - video-retrospective-common
    instruction: review-retrospective
    edit: false
    output_contracts:
      report:
        - name: retrospective-report.md
          format: retrospective-report
    rules:
      - condition: REVIEW_APPROVED
        next: COMPLETE
      - condition: REVIEW_NEEDS_FIX
        next: update_templates
