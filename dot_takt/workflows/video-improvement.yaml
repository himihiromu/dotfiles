name: video-improvement
description: 既存の動画成果物を分析・レビューし、改善修正を行う
initial_step: analyze_content
max_steps: 30

loop_monitors:
  - cycle:
      - producer_review
      - rewrite_script
    threshold: 3
    judge:
      persona: youtube-producer
      policy: video-improvement-common
      instruction: judge-improvement-loop
      rules:
        - condition: LOOP_HEALTHY
          next: producer_review
        - condition: LOOP_ABORT
          next: ABORT

  - cycle:
      - producer_review
      - rewrite_storyboard
    threshold: 3
    judge:
      persona: youtube-producer
      policy: video-improvement-common
      instruction: judge-improvement-loop
      rules:
        - condition: LOOP_HEALTHY
          next: producer_review
        - condition: LOOP_ABORT
          next: ABORT

steps:
  - name: analyze_content
    persona: content-analyzer
    policy:
      - video-improvement-common
    instruction: analyze-video
    edit: true
    required_permission_mode: edit
    output_contracts:
      report:
        - name: content-analysis.md
          format: content-analysis-report
    rules:
      - condition: STEP_COMPLETE
        next: parallel_reviews
      - condition: STEP_BLOCKED
        next: ABORT

  - name: parallel_reviews
    parallel:
      - name: education_review
        persona: education-reviewer
        policy:
          - video-improvement-common
          - review-priority
        instruction: review-script-education
        edit: false
        output_contracts:
          report:
            - name: education-review.md
              format: video-review-report

      - name: entertainment_review
        persona: entertainment-reviewer
        policy:
          - video-improvement-common
          - review-priority
        instruction: review-script-entertainment
        edit: false
        output_contracts:
          report:
            - name: entertainment-review.md
              format: video-review-report

      - name: retention_review
        persona: retention-reviewer
        policy:
          - video-improvement-common
          - review-priority
          - retention-review
        instruction: review-retention
        edit: false
        output_contracts:
          report:
            - name: retention-review.md
              format: video-review-report

      - name: japanese_review
        persona: japanese-reviewer
        policy:
          - video-improvement-common
          - review-priority
        instruction: review-script-japanese
        edit: false
        output_contracts:
          report:
            - name: japanese-review.md
              format: video-review-report

    rules:
      - condition: all("REVIEW_APPROVED", "重大または必須の修正なし")
        next: integrate_reviews
      - condition: any("REVIEW_NEEDS_FIX", "台本に必須修正あり")
        next: integrate_reviews
      - condition: any("REVIEW_BLOCKED", "前提情報不足または検証不能")
        next: ABORT

  - name: integrate_reviews
    persona: review-integrator
    policy:
      - video-improvement-common
      - review-integration
      - review-priority
    instruction: integrate-reviews
    edit: true
    required_permission_mode: edit
    output_contracts:
      report:
        - name: review-summary.md
          format: review-summary
    rules:
      - condition: STEP_COMPLETE
        next: plan_revision
      - condition: STEP_BLOCKED
        next: ABORT

  - name: plan_revision
    persona: revision-planner
    policy:
      - video-improvement-common
      - revision-policy
    instruction: plan-revision
    edit: true
    required_permission_mode: edit
    output_contracts:
      report:
        - name: revision-plan.md
          format: revision-plan
    rules:
      - condition: STEP_COMPLETE
        next: rewrite_script
      - condition: STEP_BLOCKED
        next: ABORT

  - name: rewrite_script
    persona: script-writer
    policy:
      - video-improvement-common
      - revision-policy
    instruction: rewrite-script
    edit: true
    required_permission_mode: edit
    pass_previous_response: false
    output_contracts:
      report:
        - name: script-revision.md
          format: revision-report
    rules:
      - condition: STEP_COMPLETE
        next: rewrite_storyboard
      - condition: STEP_BLOCKED
        next: ABORT

  - name: rewrite_storyboard
    persona: remotion-storyboard-designer
    policy:
      - video-improvement-common
      - revision-policy
    instruction: rewrite-storyboard
    edit: true
    required_permission_mode: edit
    pass_previous_response: false
    output_contracts:
      report:
        - name: storyboard-revision.md
          format: revision-report
    rules:
      - condition: STEP_COMPLETE
        next: producer_review
      - condition: STEP_BLOCKED
        next: producer_review

  - name: producer_review
    persona: youtube-producer
    policy:
      - video-improvement-common
    instruction: review-improved-video
    edit: false
    output_contracts:
      report:
        - name: improvement-producer-review.md
          format: improvement-producer-review-report
    rules:
      - condition: PRODUCER_APPROVE
        next: COMPLETE
      - condition: PRODUCER_REVISE_SCRIPT
        next: rewrite_script
      - condition: PRODUCER_REVISE_STORYBOARD
        next: rewrite_storyboard
      - condition: PRODUCER_BLOCKED
        next: ABORT
